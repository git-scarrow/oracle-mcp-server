name: LLM Code Review

# Self-contained inline job (no cross-repo workflow_call). The shared review
# script still lives in the public scarrow/ci repo and is fetched at runtime,
# so logic stays centralized — but there is no reusable-workflow expansion,
# which is the fragile path on Codeberg's multi-runner self-hosted setup.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR base for accurate diff
        run: |
          git fetch --no-tags origin "${{ github.event.pull_request.base.sha }}" || true
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}" || true

      - name: Fetch review script from scarrow/ci
        run: |
          curl -fsSL \
            "https://codeberg.org/scarrow/ci/raw/tag/v1/.forgejo/scripts/llm-review.py" \
            -o /tmp/llm-review.py

      - name: LLM per-file review
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          # Self-hosted review engine: LiteLLM gateway (tailnet) -> LLB P2C coder
          # pool (Qwen3-Coder-30B across m2+m4) via scarrow/ci@v1 (Bearer auth on
          # the chat/completions path). Local metal only, zero cloud cost
          # (LLM_API_KEY scoped to llb/*); the LLB handles m2<->m4 failover.
          REVIEW_PROVIDER: ollama
          LLM_HOST: http://100.64.0.6:4000
          LLM_MODEL: llb/code:latest
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 /tmp/llm-review.py
